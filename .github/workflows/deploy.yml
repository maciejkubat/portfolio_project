name: Deploy to Main

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  # id-token: write is required for requesting the OIDC JWT that AWS
  # exchanges for temporary credentials. No AWS access keys are stored
  # anywhere in this repository or in GitHub Secrets.
  id-token: write
  contents: read

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform plan & apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        run: terraform init

      - name: terraform plan
        run: terraform plan -out=tfplan

      - name: terraform apply
        run: terraform apply -auto-approve tfplan
